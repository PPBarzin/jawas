services:
  jawas-kamino:
    build: .
    container_name: jawas-kamino
    environment:
      - TARGET_PROTOCOL=KAMINO
      - ENABLE_HUNTER=true
      - ENABLE_OBSERVER=true
      - LOG_FILE=kamino_raw.jsonl
      - SOLANA_KEYPAIR_PATH=secrets/keypair.json
      - WALLET_TOML_PATH=wallet.toml
      - HUNTER_REPLAY=false
    env_file:
      - .env
    volumes:
      - ./secrets:/app/secrets:ro
      - ./wallet.toml:/app/wallet.toml:ro
    restart: always
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M

  jawas-solend:
    build: .
    container_name: jawas-solend
    environment:
      - TARGET_PROTOCOL=SOLEND
      - ENABLE_HUNTER=false
      - ENABLE_OBSERVER=true
      - LOG_FILE=solend_raw.jsonl
      - SOLANA_KEYPAIR_PATH=secrets/keypair.json
      - WALLET_TOML_PATH=wallet.toml
      - HUNTER_REPLAY=false
    env_file:
      - .env
    volumes:
      - ./secrets:/app/secrets:ro
      - ./wallet.toml:/app/wallet.toml:ro
    restart: always
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
